<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园论坛 - 首页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">🎓 校园论坛</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/}">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/post-list}">帖子</a>
                </li>
                <li class="nav-item" id="nav-user-menu">
                    <a class="nav-link" th:href="@{/login}">登录/注册</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="hero-section bg-gradient text-white py-5 mb-5">
    <div class="container text-center">
        <h1 class="display-4 fw-bold mb-4">欢迎来到校园论坛</h1>
        <p class="lead mb-4">一个让同学们互相交流、分享资源、互相帮助的平台</p>
        <button class="btn btn-light btn-lg me-2" onclick="location.href='/post-list'">浏览帖子</button>
        <button class="btn btn-outline-light btn-lg" onclick="openLoginModal()">立即参与</button>
    </div>
</div>

<div class="container">
    <div class="row mb-5">
        <div class="col-md-4 text-center mb-4">
            <div class="feature-card p-4">
                <div class="feature-icon mb-3">💬</div>
                <h5>自由讨论</h5>
                <p>任何同学都可以发布话题，互相讨论学习心得和生活感悟</p>
            </div>
        </div>
        <div class="col-md-4 text-center mb-4">
            <div class="feature-card p-4">
                <div class="feature-icon mb-3">🤝</div>
                <h5>互相帮助</h5>
                <p>在论坛上提出问题，获得同学们的帮助和建议</p>
            </div>
        </div>
        <div class="col-md-4 text-center mb-4">
            <div class="feature-card p-4">
                <div class="feature-icon mb-3">📁</div>
                <h5>资源分享</h5>
                <p>分享笔记、资料、工具等，文件大小不超过20MB</p>
            </div>
        </div>
    </div>

    <div class="row mb-5">
        <div class="col-12">
            <h2 class="mb-4">最新帖子</h2>
            <div id="latest-posts" class="row">
                <!-- 最新帖子列表将由JavaScript动态加载 -->
            </div>
        </div>
    </div>

    <div class="row mb-5">
        <div class="col-12">
            <div class="alert alert-info" role="alert">
                <h4 class="alert-heading">论坛规则</h4>
                <ul class="mb-0">
                    <li>遵守学校规章制度，不发布不当内容</li>
                    <li>尊重他人，文明讨论，禁止人身攻击</li>
                    <li>不发布广告、骚扰性内容</li>
                    <li>上传文件不超过20MB，确保服务器稳定</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
        <p class="mb-0">&copy; 2026 校园论坛. 帮助学生互相交流、分享资源。</p>
    </div>
</footer>

<!-- 登录弹窗 -->
<div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">登录</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="loginUsername" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="loginUsername" required>
                    </div>
                    <div class="mb-3">
                        <label for="loginPassword" class="form-label">密码</label>
                        <input type="password" class="form-control" id="loginPassword" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <button type="button" class="btn btn-primary" onclick="handleLogin()">登录</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/utils.js}"></script>
<script th:src="@{/js/main.js}"></script>
<script>
    // 加载最新帖子（首页显示最新的6条）
    document.addEventListener('DOMContentLoaded', function() {
        loadLatestPosts();
        updateUserNav();
    });

    function loadLatestPosts() {
        fetch('/api/posts?page=0&size=6')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('latest-posts');
                container.innerHTML = '';
                if (data.data && data.data.content && data.data.content.length > 0) {
                    data.data.content.forEach(post => {
                        const card = createPostCard(post);
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = '<div class="col-12"><p class="text-muted">暂无帖子</p></div>';
                }
            })
            .catch(error => console.error('加载帖子失败:', error));
    }

    function createPostCard(post) {
        const div = document.createElement('div');
        div.className = 'col-md-6 mb-4';
        div.innerHTML = `
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">${escapeHtml(post.title)}</h5>
                    <p class="card-text text-muted">${escapeHtml(post.content.substring(0, 100))}...</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <small class="text-muted">
                            <strong>${post.username || '未知用户'}</strong> · 
                            ${post.category} · ${formatDate(post.createdAt)}
                        </small>
                        <span class="badge bg-secondary">${post.viewCount || 0} 浏览</span>
                    </div>
                </div>
                <div class="card-footer bg-light">
                    <a href="/post/${post.id}" class="btn btn-sm btn-primary">查看详情</a>
                </div>
            </div>
        `;
        return div;
    }

    function openLoginModal() {
        const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
        loginModal.show();
    }

    function handleLogin() {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        
        if (!username || !password) {
            alert('用户名和密码不能为空');
            return;
        }

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
        })
        .then(response => response.json())
        .then(data => {
            if (data.code === 200) {
                localStorage.setItem('user', JSON.stringify(data.data.user));
                localStorage.setItem('token', data.data.token);
                alert('登录成功');
                location.reload();
            } else {
                alert('登录失败: ' + data.message);
            }
        })
        .catch(error => alert('登录请求失败'));
    }
</script>
</body>
</html>
