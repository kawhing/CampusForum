<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布/编辑帖子 - 校园论坛</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">🎓 校园论坛</a>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">发布新帖</h4>
                </div>
                <div class="card-body">
                    <form id="postForm">
                        <div class="mb-3">
                            <label for="title" class="form-label">帖子标题 *</label>
                            <input type="text" class="form-control" id="title" name="title" required placeholder="请输入帖子标题">
                            <small class="form-text text-muted">标题要清晰明了，便于其他同学理解</small>
                        </div>

                        <div class="mb-3">
                            <label for="category" class="form-label">分类 *</label>
                            <select class="form-select" id="category" name="category" required>
                                <option value="DISCUSS">讨论</option>
                                <option value="HELP">求助</option>
                                <option value="SHARE">分享</option>
                                <option value="NEWS">新闻</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="content" class="form-label">帖子内容 *</label>
                            <textarea class="form-control" id="content" name="content" rows="10" required placeholder="请输入帖子内容..."></textarea>
                            <small class="form-text text-muted">内容详细具体有助于获得更好的回复</small>
                        </div>

                        <div class="mb-3">
                            <label for="files" class="form-label">上传附件 (可选)</label>
                            <input type="file" class="form-control" id="files" name="files" multiple accept="*/*">
                            <small class="form-text text-muted">
                                可上传多个文件，单个文件不超过20MB，文件总大小不超过100MB
                            </small>
                            <div id="file-list" class="mt-2"></div>
                        </div>

                        <div class="alert alert-info" role="alert">
                            <strong>提示：</strong>
                            <ul class="mb-0">
                                <li>发布帖子前请仔细阅读论坛规则</li>
                                <li>禁止发布重复内容、广告等不当信息</li>
                                <li>请尊重他人隐私，不发布他人个人信息</li>
                            </ul>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">📤 发布帖子</button>
                            <button type="reset" class="btn btn-secondary">清空</button>
                            <a href="/post-list" class="btn btn-outline-secondary">返回</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
        <p class="mb-0">&copy; 2026 校园论坛. 帮助学生互相交流、分享资源。</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/utils.js}"></script>
<script>
    const MAX_FILE_SIZE = 20 * 1024 * 1024; // 20MB
    const fileInput = document.getElementById('files');
    const fileList = document.getElementById('file-list');
    const selectedFiles = [];

    document.addEventListener('DOMContentLoaded', function() {
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user) {
            // 获取当前URL中的ID
            const pathParts = window.location.pathname.split('/');
            const postId = pathParts[pathParts.length - 1] || '0';
            // 保存用户想要访问的页面
            sessionStorage.setItem('redirectAfterLogin', `/post/edit/${postId}`);
            // 重定向到登录页
            window.location.href = '/login';
        }
        updateUserNav();
    });

    // 文件选择处理
    fileInput.addEventListener('change', function(e) {
        fileList.innerHTML = '';
        selectedFiles.length = 0;

        Array.from(e.target.files).forEach((file, index) => {
            if (file.size > MAX_FILE_SIZE) {
                const item = document.createElement('div');
                item.className = 'alert alert-danger';
                item.textContent = `❌ ${file.name} (${formatFileSize(file.size)}) - 超过20MB限制`;
                fileList.appendChild(item);
            } else {
                selectedFiles.push(file);
                const item = document.createElement('div');
                item.className = 'alert alert-success d-flex justify-content-between align-items-center';
                item.innerHTML = `
                    <span>✓ ${file.name} (${formatFileSize(file.size)})</span>
                    <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeFile(${index})">移除</button>
                `;
                fileList.appendChild(item);
            }
        });
    });

    function removeFile(index) {
        selectedFiles.splice(index, 1);
        fileInput.value = '';
        fileList.innerHTML = '';
        selectedFiles.forEach((file, i) => {
            const item = document.createElement('div');
            item.className = 'alert alert-success d-flex justify-content-between align-items-center';
            item.innerHTML = `
                <span>✓ ${file.name} (${formatFileSize(file.size)})</span>
                <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeFile(${i})">移除</button>
            `;
            fileList.appendChild(item);
        });
    }

    function formatFileSize(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
    }

    document.getElementById('postForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user) {
            alert('请先登录');
            return;
        }

        const title = document.getElementById('title').value;
        const category = document.getElementById('category').value;
        const content = document.getElementById('content').value;

        try {
            // 发布帖子
            const formData = new URLSearchParams();
            formData.append('userId', user.id);
            formData.append('title', title);
            formData.append('content', content);
            formData.append('category', category);

            const postResponse = await fetch('/api/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            const postData = await postResponse.json();
            if (postData.code !== 200) {
                alert('发布失败: ' + postData.message);
                return;
            }

            const postId = postData.data.id;

            // 上传文件
            if (selectedFiles.length > 0) {
                for (const file of selectedFiles) {
                    const uploadFormData = new FormData();
                    uploadFormData.append('postId', postId);
                    uploadFormData.append('userId', user.id);
                    uploadFormData.append('file', file);

                    const uploadResponse = await fetch('/api/resources/upload', {
                        method: 'POST',
                        body: uploadFormData
                    });

                    const uploadData = await uploadResponse.json();
                    if (uploadData.code !== 200) {
                        console.error('文件上传失败:', file.name);
                    }
                }
            }

            alert('发布成功');
            window.location.href = `/post/${postId}`;
        } catch (error) {
            alert('发布失败，请重试');
            console.error('发布错误:', error);
        }
    });
</script>
</body>
</html>
