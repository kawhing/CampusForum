<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户个人资料 - 校园论坛</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">🎓 校园论坛</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/post-list}">帖子</a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/login}">登录</a>
                </li>
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" sec:authentication="name"></a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                        <li><a class="dropdown-item" th:href="@{/user-profile}">个人资料</a></li>
                        <li><a class="dropdown-item" th:href="@{/post-edit}">发布新帖</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button class="dropdown-item" type="submit">退出登录</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="row">
        <div class="col-md-4">
            <div class="card mb-4">
                <div class="card-body text-center">
                    <img id="avatar" src="https://via.placeholder.com/150" alt="头像" class="rounded-circle mb-3" style="width: 150px; height: 150px;">
                    <h4 id="username-display"></h4>
                    <p class="text-muted" id="email-display"></p>
                    <p id="realname-display"></p>
                    <p id="bio-display" class="text-muted"></p>
                    <hr>
                    <p><strong>加入时间:</strong> <span id="join-date"></span></p>
                    <button class="btn btn-primary w-100" onclick="editProfile()">编辑个人资料</button>
                    <button class="btn btn-outline-danger w-100 mt-2" onclick="logout()">退出登录</button>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <!-- 用户发布的帖子 -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0">我的帖子</h5>
                </div>
                <div class="card-body">
                    <div id="user-posts" class="row">
                        <!-- 用户帖子将动态加载 -->
                    </div>
                </div>
            </div>

            <!-- 用户上传的文件 -->
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">我上传的文件</h5>
                </div>
                <div class="card-body">
                    <div id="user-resources">
                        <!-- 用户文件列表将动态加载 -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 编辑个人资料弹窗 -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑个人资料</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editForm">
                    <div class="mb-3">
                        <label for="editRealname" class="form-label">真实姓名</label>
                        <input type="text" class="form-control" id="editRealname">
                    </div>
                    <div class="mb-3">
                        <label for="editAvatar" class="form-label">头像URL</label>
                        <input type="text" class="form-control" id="editAvatar">
                    </div>
                    <div class="mb-3">
                        <label for="editBio" class="form-label">个人介绍</label>
                        <textarea class="form-control" id="editBio" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveProfile()">保存</button>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
        <p class="mb-0">&copy; 2026 校园论坛. 帮助学生互相交流、分享资源。</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/utils.js}"></script>
<script>
    let currentUser = null;
    let currentPostPage = 0;
    let currentResourcePage = 0;

    document.addEventListener('DOMContentLoaded', function() {
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user) {
            alert('请先登录');
            window.location.href = '/login';
            return;
        }

        currentUser = user;
        loadProfileData();
        updateUserNav();
    });

    function loadProfileData() {
        fetch(`/api/users/${currentUser.id}`)
            .then(response => response.json())
            .then(data => {
                const user = data.data;
                document.getElementById('username-display').textContent = user.username;
                document.getElementById('email-display').textContent = user.email;
                document.getElementById('realname-display').textContent = user.realname || '未设置真实姓名';
                document.getElementById('bio-display').textContent = user.bio || '这个用户还没有添加个人介绍';
                document.getElementById('join-date').textContent = formatDate(user.createdAt);
                if (user.avatar) {
                    document.getElementById('avatar').src = user.avatar;
                }

                // 填充编辑表单
                document.getElementById('editRealname').value = user.realname || '';
                document.getElementById('editAvatar').value = user.avatar || '';
                document.getElementById('editBio').value = user.bio || '';
            })
            .catch(error => console.error('加载用户信息失败:', error));

        // 加载用户的帖子
        loadUserPosts();
        // 加载用户的文件
        loadUserResources();
    }

    function loadUserPosts() {
        fetch(`/api/posts/user/${currentUser.id}?page=${currentPostPage}&size=5`)
            .then(response => response.json())
            .then(data => {
                const postsContainer = document.getElementById('user-posts');
                postsContainer.innerHTML = '';

                if (!data.data || !data.data.content || data.data.content.length === 0) {
                    postsContainer.innerHTML = '<p class="text-muted">还没有发布过帖子</p>';
                    return;
                }

                data.data.content.forEach(post => {
                    const col = document.createElement('div');
                    col.className = 'col-12 mb-3';
                    col.innerHTML = `
                        <div class="card">
                            <div class="card-body">
                                <h6 class="card-title">
                                    <a href="/post/${post.id}" class="text-decoration-none">
                                        ${escapeHtml(post.title)}
                                    </a>
                                </h6>
                                <small class="text-muted">
                                    ${post.category} · ${formatDate(post.createdAt)} · 
                                    <span class="badge bg-secondary">${post.viewCount || 0}</span> 浏览 · 
                                    <span class="badge bg-secondary">${post.replyCount || 0}</span> 回复
                                </small>
                            </div>
                        </div>
                    `;
                    postsContainer.appendChild(col);
                });
            })
            .catch(error => console.error('加载用户帖子失败:', error));
    }

    function loadUserResources() {
        fetch(`/api/resources/user/${currentUser.id}?page=${currentResourcePage}&size=10`)
            .then(response => response.json())
            .then(data => {
                const resourcesContainer = document.getElementById('user-resources');
                resourcesContainer.innerHTML = '';

                if (!data.data || !data.data.content || data.data.content.length === 0) {
                    resourcesContainer.innerHTML = '<p class="text-muted">还没有上传过文件</p>';
                    return;
                }

                const list = document.createElement('table');
                list.className = 'table table-striped';
                list.innerHTML = `
                    <thead>
                        <tr>
                            <th>文件名</th>
                            <th>大小</th>
                            <th>上传时间</th>
                            <th>下载次数</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                `;

                const tbody = list.querySelector('tbody');
                data.data.content.forEach(resource => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${escapeHtml(resource.fileName)}</td>
                        <td>${formatFileSize(resource.fileSize)}</td>
                        <td>${formatDate(resource.createdAt)}</td>
                        <td>${resource.downloadCount}</td>
                        <td>
                            <a href="/api/resources/download/${resource.id}" class="btn btn-sm btn-primary">下载</a>
                            <button class="btn btn-sm btn-danger" onclick="deleteResource(${resource.id})">删除</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                resourcesContainer.appendChild(list);
            })
            .catch(error => console.error('加载用户文件失败:', error));
    }

    function editProfile() {
        const editModal = new bootstrap.Modal(document.getElementById('editModal'));
        editModal.show();
    }

    function saveProfile() {
        const realname = document.getElementById('editRealname').value;
        const avatar = document.getElementById('editAvatar').value;
        const bio = document.getElementById('editBio').value;

        const formData = new URLSearchParams();
        if (realname) formData.append('realname', realname);
        if (avatar) formData.append('avatar', avatar);
        if (bio) formData.append('bio', bio);

        fetch(`/api/users/${currentUser.id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.code === 200) {
                alert('个人资料更新成功');
                localStorage.setItem('user', JSON.stringify(data.data));
                bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                loadProfileData();
            } else {
                alert('更新失败: ' + data.message);
            }
        })
        .catch(error => alert('更新失败，请重试'));
    }

    function deleteResource(resourceId) {
        if (confirm('确定要删除这个文件吗？')) {
            fetch(`/api/resources/${resourceId}`, { method: 'DELETE' })
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200) {
                        alert('删除成功');
                        loadUserResources();
                    }
                });
        }
    }

    function logout() {
        if (confirm('确定要退出登录吗？')) {
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            window.location.href = '/';
        }
    }

    function formatFileSize(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
    }
</script>
</body>
</html>
