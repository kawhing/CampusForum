<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 校园论坛</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">🎓 校园论坛</a>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h2 class="text-center mb-5">用户登录</h2>

                    <!-- ✅ 修复1: action="/login" method="post" 走 Spring Security 标准登录 -->
                    <!-- ✅ 修复2: 不再用 fetch + localStorage，Session 由服务端管理 -->
                    <form th:action="@{/login}" method="post">

                        <!-- ✅ 修复3: CSRF token（虽然当前 SecurityConfig 禁用了 CSRF，
                             但建议后续开启，这里先保留标准写法） -->
                        <!-- <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/> -->

                        <div class="mb-3">
                            <label for="username" class="form-label">用户名</label>
                            <input type="text" class="form-control" id="username"
                                   name="username" required autofocus>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">密码</label>
                            <input type="password" class="form-control" id="password"
                                   name="password" required>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input"
                                   id="remember-me" name="remember-me">
                            <label class="form-check-label" for="remember-me">记住我</label>
                        </div>

                        <!-- ✅ 修复4: 显示 Spring Security 返回的登录错误信息 -->
                        <div th:if="${param.error}"
                             class="alert alert-danger" role="alert">
                            用户名或密码错误，请重试。
                        </div>

                        <!-- 登出成功提示 -->
                        <div th:if="${param.logout}"
                             class="alert alert-success" role="alert">
                            您已成功退出登录。
                        </div>

                        <button type="submit" class="btn btn-primary w-100">登录</button>
                    </form>

                    <hr>
                    <p class="text-center">还没有账户？ <a th:href="@{/register}">立即注册</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
        <p class="mb-0">&copy; 2026 校园论坛. 帮助学生互相交流、分享资源。</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
