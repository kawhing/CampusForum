<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子列表 - 校园论坛</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">🎓 校园论坛</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/post-list}">帖子</a>
                </li>
                <li class="nav-item" id="nav-user-menu">
                    <a class="nav-link" th:href="@{/login}">登录</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="row mb-4">
        <div class="col-md-8">
            <h1 class="mb-4">论坛帖子</h1>
            <div class="mb-3 d-flex gap-2">
                <input type="text" class="form-control" id="searchKeyword" placeholder="搜索帖子...">
                <button class="btn btn-primary" onclick="searchPosts()">搜索</button>
            </div>

            <div class="mb-3">
                <button class="btn btn-outline-secondary btn-sm" onclick="filterCategory('DISCUSS')">讨论</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="filterCategory('HELP')">求助</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="filterCategory('SHARE')">分享</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="filterCategory('NEWS')">新闻</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="loadPosts(0)">全部</button>
            </div>

            <div id="posts-container">
                <!-- 帖子列表将动态加载 -->
            </div>

            <!-- 分页 -->
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center" id="pagination">
                    <!-- 分页按钮将动态生成 -->
                </ul>
            </nav>
        </div>

        <div class="col-md-4">
            <div class="card sticky-top" style="top: 80px;">
                <div class="card-body">
                    <h5 class="card-title">快速操作</h5>
                    <button class="btn btn-primary w-100 mb-2" id="newPostBtn" onclick="redirectToNewPost()">
                        📝 发布新帖
                    </button>
                    <div id="user-info" style="display:none;">
                        <hr>
                        <p class="mb-2">
                            欢迎, <strong id="username-display"></strong>!
                        </p>
                        <a href="/profile/" id="profileLink" class="btn btn-sm btn-outline-primary w-100 mb-2">
                            👤 我的个人资料
                        </a>
                        <button onclick="logout()" class="btn btn-sm btn-outline-danger w-100">
                            🚪 退出登录
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
        <p class="mb-0">&copy; 2026 校园论坛. 帮助学生互相交流、分享资源。</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/utils.js}"></script>
<script>
    let currentPage = 0;
    let currentSize = 10;
    let currentCategory = null;
    let totalPages = 0;

    document.addEventListener('DOMContentLoaded', function() {
        updateUserNav();
        loadPosts(0);
    });

    function loadPosts(page) {
        currentPage = page;
        const url = currentCategory 
            ? `/api/posts/category/${currentCategory}?page=${page}&size=${currentSize}`
            : `/api/posts?page=${page}&size=${currentSize}`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                renderPosts(data.data);
                totalPages = data.data.totalPages;
                renderPagination();
            })
            .catch(error => console.error('加载帖子失败:', error));
    }

    function renderPosts(pageData) {
        const container = document.getElementById('posts-container');
        container.innerHTML = '';

        if (!pageData || !pageData.content || pageData.content.length === 0) {
            container.innerHTML = '<div class="alert alert-info">暂无帖子</div>';
            return;
        }

        pageData.content.forEach(post => {
            const card = document.createElement('div');
            card.className = 'card mb-3';
            card.innerHTML = `
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h5 class="card-title">
                                <a href="/post/${post.id}" class="text-decoration-none">
                                    ${escapeHtml(post.title)}
                                </a>
                            </h5>
                            <p class="card-text text-muted">${escapeHtml(post.content.substring(0, 150))}...</p>
                            <small class="text-muted">
                                <strong>${post.username || '未知用户'}</strong> · 
                                <span class="badge bg-info">${post.category}</span> · 
                                ${formatDate(post.createdAt)}
                            </small>
                        </div>
                        <div class="text-end">
                            ${post.isPinned ? '<span class="badge bg-warning">置顶</span>' : ''}
                            ${post.isLocked ? '<span class="badge bg-danger">已锁定</span>' : ''}
                        </div>
                    </div>
                    <div class="mt-2 d-flex justify-content-between">
                        <div>
                            <span class="me-3"><span class="badge bg-secondary">${post.viewCount || 0}</span> 浏览</span>
                            <span><span class="badge bg-secondary">${post.replyCount || 0}</span> 回复</span>
                        </div>
                        <a href="/post/${post.id}" class="btn btn-sm btn-primary">查看详情</a>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function renderPagination() {
        const pagination = document.getElementById('pagination');
        pagination.innerHTML = '';

        if (currentPage > 0) {
            const prev = document.createElement('li');
            prev.className = 'page-item';
            prev.innerHTML = `<a class="page-link" onclick="loadPosts(${currentPage - 1})">上一页</a>`;
            pagination.appendChild(prev);
        }

        for (let i = Math.max(0, currentPage - 2); i <= Math.min(totalPages - 1, currentPage + 2); i++) {
            const li = document.createElement('li');
            li.className = 'page-item' + (i === currentPage ? ' active' : '');
            li.innerHTML = `<a class="page-link" onclick="loadPosts(${i})">${i + 1}</a>`;
            pagination.appendChild(li);
        }

        if (currentPage < totalPages - 1) {
            const next = document.createElement('li');
            next.className = 'page-item';
            next.innerHTML = `<a class="page-link" onclick="loadPosts(${currentPage + 1})">下一页</a>`;
            pagination.appendChild(next);
        }
    }

    function filterCategory(category) {
        currentCategory = category === 'all' ? null : category;
        loadPosts(0);
    }

    function searchPosts() {
        const keyword = document.getElementById('searchKeyword').value.trim();
        if (!keyword) {
            alert('请输入搜索关键词');
            return;
        }

        fetch(`/api/posts/search?keyword=${encodeURIComponent(keyword)}&page=0&size=${currentSize}`)
            .then(response => response.json())
            .then(data => {
                renderPosts(data.data);
                totalPages = data.data.totalPages;
                renderPagination();
            })
            .catch(error => console.error('搜索失败:', error));
    }

    function redirectToNewPost() {
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user) {
            alert('请先登录');
            window.location.href = '/login';
        } else {
            // 实际应跳转到发布页面，这里简化为弹窗
            alert('跳转到发布新帖页面 (需要实现发布页面)');
        }
    }

    function logout() {
        if (confirm('确定要退出登录吗？')) {
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            location.reload();
        }
    }
</script>
</body>
</html>
