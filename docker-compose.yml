services:
  # MongoDB数据库服务
  mongodb:
    image: mongo:6.0
    container_name: anon-qa-mongodb
    environment:
      MONGO_INITDB_DATABASE: anon-qa
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - anon-qa-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Node.js后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anon-qa-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/anon-qa
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 5000
      NODE_ENV: production
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@campus.edu}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123456}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ALLOW_ADMIN_PASSWORD_SYNC: ${ALLOW_ADMIN_PASSWORD_SYNC:-true}
      ALLOW_ADMIN_SYNC_WHEN_BLOCKED: ${ALLOW_ADMIN_SYNC_WHEN_BLOCKED:-false}
    networks:
      - anon-qa-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/questions"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # React前端服务（通过Nginx提供）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    container_name: anon-qa-frontend
    ports:
      - "80:80"
    networks:
      - anon-qa-network
    depends_on:
      - backend
    restart: unless-stopped

  # 可选：轻量级文本安全/心理风险模型服务（<1B 参数）
  safety-model:
    build:
      context: ./docker/safety-model
    container_name: anon-qa-safety-model
    environment:
      - MODEL_NAME=${SAFETY_MODEL_NAME:-uer/roberta-base-chinese-cluecorpussmall}
      - MODEL_DEVICE=${SAFETY_MODEL_DEVICE:-cpu}
      - PORT=8088
    ports:
      - "8088:8088"
    networks:
      - anon-qa-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  # MongoDB数据卷
  mongo-data:
    driver: local

networks:
  # 自定义网络
  anon-qa-network:
    driver: bridge
